<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Contact — Vlance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="icon" type="image/png" href="png/vlance logo.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="vlance.css"/>
  <style>
    body { margin: 0; padding: 0; background: #fffefe; display: flex; flex-direction: column; min-height: 100vh; }
    .contact-page-header {
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
    }
    .contact-page-header a {
      font-family: "Bricolage Grotesque", sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: #040000;
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .contact-page-header a:hover { opacity: 0.7; }
    .contact-page-form {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }
    .contact-page-form h1 {
      font-family: "Bricolage Grotesque", sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      color: #040000;
      margin: 0 0 0.25em;
      letter-spacing: -0.03em;
      text-align: center;
    }
    .contact-page-form p {
      font-family: "Bricolage Grotesque", sans-serif;
      font-size: 1.1rem;
      color: #666;
      margin: 0 0 2.5rem;
      text-align: center;
    }
    .tally-embed-wrap {
      width: 100%;
      max-width: 640px;
    }
  </style>
</head>
<body>
  <header class="contact-page-header">
    <a href="index.html">← Back to Vlance</a>
  </header>

  <main class="contact-page-form">
    <h1>Get in touch</h1>
    <p>Fill in the form and we'll get back to you shortly.</p>
    <div class="tally-embed-wrap">
      <!-- Replace the src URL below with your Tally.so embed URL -->
      <iframe
        data-tally-src="https://tally.so/embed/YOUR_FORM_ID?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
        loading="lazy"
        width="100%"
        height="500"
        frameborder="0"
        marginheight="0"
        marginwidth="0"
        title="Contact Vlance"
        style="border:none;"
      ></iframe>
      <script>var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s);}</script>
    </div>
  </main>
</body>
</html>
